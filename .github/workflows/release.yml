name: Release plugins on tag push

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ github.sha }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          BODY=$(awk -v tag="$TAG" '
            BEGIN { found=0 }
            /^## / {
              if (found) exit
              header=$2
              gsub(/[^v0-9.].*/, "", header)
              if (header == tag) { found=1; next }
            }
            found { print }
          ' plugin/CHANGELOG.md)

          if [ -z "$BODY" ]; then
            echo "::warning::No changelog entry found for $TAG, using default message"
            BODY="Release $TAG"
          fi

          echo "$BODY" > /tmp/release-body.md

      - name: Delete existing release if present
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" &>/dev/null; then
            echo "Deleting existing release for $TAG"
            gh release delete "$TAG" --yes
          fi

      - name: Create GitHub Release
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-body.md

  release-codex:
    needs: release
    permissions:
      contents: write
    uses: ./.github/workflows/release-codex.yml
    with:
      target_sha: ${{ needs.release.outputs.target_sha }}
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
